<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ event_name }}</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #1a1a1a;
      background: #fafafa;
    }

    .container {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 0;
    }

    h1 {
      font-size: 1.5rem;
      margin: 1rem 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="container">
    <h1>{{ event_name }}</h1>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
