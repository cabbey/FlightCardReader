{% extends "base.html" %}

{% block head %}
<style>
  .login-form {
    max-width: 400px;
    margin: 2rem auto;
    padding: 1.5rem;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    background: #fff;
  }
  .login-form h2 {
    margin-top: 0;
    margin-bottom: 1rem;
  }
  .login-form label {
    display: block;
    margin-bottom: 0.25rem;
    font-weight: 500;
  }
  .login-form input[type="email"],
  .login-form input[type="password"] {
    width: 100%;
    padding: 0.5rem;
    margin-bottom: 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1rem;
  }
  .login-form button {
    width: 100%;
    padding: 0.6rem;
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
  }
  .login-form button:hover {
    background: #0d47a1;
  }
  .error-msg {
    padding: 0.5rem;
    margin-bottom: 1rem;
    background: #fbe9e7;
    color: #c62828;
    border-radius: 4px;
    font-size: 0.9rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-form">
  <h2>Login</h2>
  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" maxlength="254" required autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" maxlength="128" required>
    <button type="submit">Sign In</button>
  </form>
</div>
{% endblock %}
